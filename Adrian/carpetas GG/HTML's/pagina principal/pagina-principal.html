<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yakumo - Master Ninja Interface</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;900&family=Syncopate:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="canvas-container" id="main-canvas">

        <div class="canvas-dot-overlay"></div>
        <div class="ui-corner-bracket top-left"></div>
        <div class="ui-corner-bracket bottom-right"></div>

        <div class="nihility-bg-text">SHINOBI SHINOBI SHINOBI</div>

        <!-- CANVAS PARA EL EFECTO DE FLORES DELICADAS -->
        <canvas id="petals-canvas"></canvas>

        <!-- PANEL IZQUIERDO -->
        <section class="left-panel">
            <nav class="nav-links">
                <a href="../index.html">Historia</a>
                <a href="../armas.html">Armas</a>
                <a href="../personajes.html">Personajes</a>
            </nav>

            <div class="hero-quote-header">
                I am Yakumo, the Master Ninja of Raven Clan.
                <span class="quote-jp">俺は八雲、鴉の一族の頭領だ。</span>
            </div>

            <div class="main-title-group">
                <span class="japanese-sub">鴉の血</span>
                <h1 class="main-kanji">八雲</h1>
                <br>
                <div class="numeric-badge">NG-IV</div>

                <div class="music-player" id="player-card">
                    <audio id="audio-element"
                        src="https://archive.org/download/ninja-gaiden-ii-the-dark-sword-of-chaos-1990-ost/Ninja%20Gaiden%202%20-%2001.%20Chaosium%20Sword.mp3"></audio>

                    <div class="player-info">
                        <span class="track-title" id="track-name">Chaosium Sword - Ninja Gaiden OST</span>
                        <span class="time-display" id="time-track">0:00 / 0:00</span>
                    </div>

                    <div class="progress-container" id="progress-cont">
                        <div class="progress-bar" id="progress-actual"></div>
                    </div>

                    <div class="player-controls">
                        <button class="play-btn" id="play-trigger">Play</button>
                        <div class="volume-container">
                            <span class="volume-label">VOL</span>
                            <input type="range" class="volume-slider" id="vol-slider" min="0" max="1" step="0.05"
                                value="0.5">
                        </div>
                    </div>
                </div>
            </div>

            <div class="left-footer">
                <p class="game-meta">RAVEN TACTICS // KARMA: INFINITE</p>
                <div class="tag-pill">RAVEN STRIKE!</div>
            </div>
        </section>

        <!-- PANEL CENTRAL -->
        <section class="center-panel">
            <div class="art-window">
                <span class="large-bg-kanji">鴉</span>
                <div class="tech-overlay">
                    <span>STATUS: LETHAL</span>
                    <span>CLAN: RAVEN</span>
                    <div class="live-pulse-bar"></div>
                </div>
            </div>
            <!-- Elemento Raíz del Personaje asignado para Parallax Suave -->
            <div class="character-root" id="character-layer">
                <img src="https://media.discordapp.net/attachments/1436926742223917240/1521567825854988298/erasebg-transformed.png?ex=6a454df7&is=6a43fc77&hm=4320dd1c17a60f20a91e0d80e57f2acfac2e5c74f27feae4a27fca6ea83ab6b4&=&format=webp&quality=lossless&width=967&height=544"
                    alt="Render" class="character-img">
            </div>
        </section>

        <!-- PANEL DERECHO -->
        <aside class="right-panel">
            <div class="pill-box">YAKUMO</div>
            <div class="vertical-text-wrap">
                <span class="v-kanji-title">八雲</span>
                <span class="v-latin-sub">YAKUMO</span>
                <span class="diamond">✦</span>
                <span class="v-latin-sub">SHINOBI</span>
            </div>
            <div class="panel-footer-stamp">
                <div style="color: rgba(255,255,255,0.2); font-size: 10px;">—</div>
                <p class="micro-japanese">新たなる影</p>
            </div>
        </aside>

    </div>

    <script src="script.js"></script>
</body>

</html>
